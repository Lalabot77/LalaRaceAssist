name: Bug Report
description: Report a problem with the Lala Race Assist Plugin
title: "[Bug]: "
labels: ["bug"]

body:

- type: markdown
  attributes:
    value: |
      Thanks for reporting a bug in **Lala Race Assist Plugin**.

      Please fill in the details below so we can reproduce the issue.

- type: input
  id: plugin_version
  attributes:
    label: Plugin version
    description: The plugin version from the GitHub release you installed
    placeholder: e.g. v1.0
  validations:
    required: "true"

- type: input
  id: simhub_version
  attributes:
    label: SimHub version
    description: You can find this in SimHub → About
  validations:
    required: "true"

- type: dropdown
  id: simulator
  attributes:
    label: Simulator
    options:
      - iRacing
  validations:
    required: "true"

- type: dropdown
  id: iracing_extra_properties
  attributes:
    label: RSC.iRacingExtraProperties installed?
    description: This plugin is currently required.
    options:
      - Yes
      - No
      - Not sure

- type: input
  id: dashboard
  attributes:
    label: Dashboard being used
    placeholder: Lala Race Dash / Lala Strategy Dash / custom

- type: textarea
  id: description
  attributes:
    label: Describe the problem
    description: What happened?
  validations:
    required: "true"

- type: textarea
  id: steps
  attributes:
    label: Steps to reproduce
    description: What did you do before the issue appeared?

- type: textarea
  id: expected
  attributes:
    label: Expected behaviour
    description: What should have happened?

- type: textarea
  id: logs
  attributes:
    label: SimHub logs
    description: |
      Please paste relevant SimHub log lines or attach the log file.

      Logs are located here:

      Documents/SimHub/Logs/

      Screenshots or short videos are also helpful.
