name: Bug Report
description: Report a problem with the Lala Race Assist Plugin
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in **Lala Race Assist Plugin**.

        Please fill in the details below so the problem can be reproduced properly.

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      description: The plugin version from the GitHub release you installed
      placeholder: e.g. v1.0
    validations:
      required: true

  - type: input
    id: simhub_version
    attributes:
      label: SimHub version
      description: You can find this in SimHub -> About
      placeholder: e.g. 9.8.1
    validations:
      required: true

  - type: dropdown
    id: simulator
    attributes:
      label: Simulator
      options:
        - "iRacing"
    validations:
      required: true

  - type: dropdown
    id: iracing_extra_properties
    attributes:
      label: Is RSC.iRacingExtraProperties installed?
      description: This dependency is currently required.
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true

  - type: input
    id: dashboard_used
    attributes:
      label: Dashboard being used
      description: Leave blank if not relevant
      placeholder: Lala Race Dash / Lala Strategy Dash / custom

  - type: checkboxes
    id: session_state
    attributes:
      label: When did the issue occur?
      options:
        - label: "In a live iRacing session"
        - label: "While in replay"
        - label: "In SimHub Dash Studio"
        - label: "Not sure"

  - type: textarea
    id: description
    attributes:
      label: Describe the problem
      description: What happened?
      placeholder: Explain the issue clearly
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do before the issue appeared?
      placeholder: |
        1. Open SimHub
        2. Load iRacing session
        3. Open Lala Race Dash
        4. Observe the issue

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened instead?

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or video
      description: |
        Please paste relevant SimHub log lines or attach screenshots/video.

        SimHub logs are usually found in:
        Documents/SimHub/Logs/
